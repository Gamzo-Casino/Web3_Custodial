version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gamzo
      POSTGRES_PASSWORD: gamzo_dev_password
      POSTGRES_DB: gamzo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamzo -d gamzo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
